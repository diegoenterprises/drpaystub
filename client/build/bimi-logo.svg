<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" version="1.2" baseProfile="tiny-ps" viewBox="0 0 100 100">
  <title>Saurellius</title>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cfc"/>
      <stop offset="1" stop-color="#299CFF"/>
    </linearGradient>
    <linearGradient id="hex" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#CA3DFF"/>
